# wtwlt local dev broker (Mosquitto 2.x, brew-installed).
#
# Run from the server/ directory:  mosquitto -c mosquitto/mosquitto.conf
# (the `just server broker` recipe does this).
#
# DEV ONLY: anonymous access on the default port so the mock publisher and
# `mosquitto_sub` can connect without credentials. For the real Pi deployment,
# disable anonymous and add a password file / ACLs (see server/README.md).

listener 1883
allow_anonymous true

# Log to stdout so the broker terminal shows connections/messages.
log_dest stdout
log_type all

# Persist retained messages (e.g. station status / LWT) across restarts.
# Path is relative to the working directory; `just server broker` creates it.
persistence true
persistence_location ./data/
