<!DOCTYPE html>
<html lang="en" data-theme="night">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>wtwlt — what's the weather like today?</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛅</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
  /* ── earth-tone themes (set on <html data-theme>) ───────────────── */
  :root {
    --bg-top:#23222E; --bg-bottom:#1A1714;
    --ink:#E8DCC4; --ink-dim:rgba(232,220,196,0.55);
    --accent:#9CAF88; --accent-2:#D9A441;
    --card-bg:rgba(255,255,255,0.05); --card-border:rgba(255,255,255,0.09);
    --grid:rgba(232,220,196,0.10);
    --s1:#C97B5A; --s2:#7FA6A6; --s3:#D9A441; --s4:#7A8B5A; /* chart series */
  }
  [data-theme="clear-day"] {
    --bg-top:#EFE6D0; --bg-bottom:#D9C7A3;
    --ink:#3B2F2A; --ink-dim:rgba(59,47,42,0.55);
    --accent:#5E6E47; --accent-2:#B5654A;
    --card-bg:rgba(255,255,255,0.45); --card-border:rgba(59,47,42,0.13);
    --grid:rgba(59,47,42,0.10);
  }
  [data-theme="dusk"] {
    --bg-top:#C97B5A; --bg-bottom:#5B4E7E;
    --ink:#F6EEE2; --ink-dim:rgba(246,238,226,0.62);
    --accent:#FFD07B; --accent-2:#E8DCC4;
    --card-bg:rgba(0,0,0,0.27); --card-border:rgba(255,255,255,0.17);
    --grid:rgba(246,238,226,0.13);
  }
  [data-theme="night"] {
    --bg-top:#23222E; --bg-bottom:#1A1714;
    --ink:#E8DCC4; --ink-dim:rgba(232,220,196,0.5);
    --accent:#9CAF88; --accent-2:#D9A441;
    --card-bg:rgba(255,255,255,0.05); --card-border:rgba(255,255,255,0.09);
    --grid:rgba(232,220,196,0.10);
  }
  [data-theme="rain"] {
    --bg-top:#46544E; --bg-bottom:#2C3833;
    --ink:#E6ECE5; --ink-dim:rgba(230,236,229,0.55);
    --accent:#7FA6A6; --accent-2:#9CAF88;
    --card-bg:rgba(255,255,255,0.05); --card-border:rgba(255,255,255,0.09);
    --grid:rgba(230,236,229,0.10);
  }
  [data-theme="storm"] {
    --bg-top:#2B2F36; --bg-bottom:#191C21;
    --ink:#E8EAEE; --ink-dim:rgba(232,234,238,0.52);
    --accent:#FFC857; --accent-2:#8A93A0;
    --card-bg:rgba(255,255,255,0.07); --card-border:rgba(255,255,255,0.11);
    --grid:rgba(232,234,238,0.10);
  }

  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    background:linear-gradient(170deg,var(--bg-top) 0%,var(--bg-bottom) 100%);
    background-attachment:fixed; color:var(--ink); min-height:100vh; padding:24px;
    overflow-x:hidden;
    transition:background 1.2s ease, color 0.6s ease;
  }
  canvas { max-width:100%; }
  h1,h2,h3,.value,.big { font-family:'Raleway',sans-serif; }

  .wrap { max-width:1180px; margin:0 auto; }

  /* header */
  header { display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; padding:8px 0 22px; }
  .brand h1 { font-size:30px; font-weight:700; letter-spacing:0.5px; }
  .brand h1 .dot { color:var(--accent-2); }
  .brand p { color:var(--ink-dim); font-size:13px; margin-top:2px; }
  .head-right { display:flex; align-items:center; gap:14px; }
  .status { display:flex; align-items:center; gap:7px; font-size:12px; color:var(--ink-dim); }
  .status .led { width:9px; height:9px; border-radius:50%; background:#8a8; box-shadow:0 0 8px currentColor; }
  .status.online .led { color:#7BE0AD; background:#7BE0AD; }
  .status.offline .led { color:#FF8A9B; background:#FF8A9B; }
  .toggle { display:inline-flex; border:1px solid var(--card-border); border-radius:20px; overflow:hidden; background:var(--card-bg); }
  .toggle button { background:none; border:none; color:var(--ink-dim); font:inherit; font-size:12px; font-weight:600; padding:6px 12px; cursor:pointer; transition:all .15s; }
  .toggle button.active { background:var(--accent); color:var(--bg-bottom); }
  .iconlink { opacity:.55; color:var(--ink); transition:opacity .15s, transform .15s; }
  .iconlink:hover { opacity:1; transform:translateY(-1px); }

  /* card / panel */
  .card, .panel { background:var(--card-bg); border:1px solid var(--card-border); border-radius:16px; }
  .panel { padding:20px; overflow:hidden; min-width:0; }
  .panel h2 { font-size:13px; font-weight:600; color:var(--accent); text-transform:uppercase; letter-spacing:1.2px; margin-bottom:14px; }
  .panel-head { display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
  .panel-head h2 { margin-bottom:0; }
  .metric-tabs { display:flex; gap:6px; flex-wrap:wrap; }
  .mtab { font-size:11px; font-weight:600; padding:4px 11px; border-radius:14px; border:1px solid var(--card-border); color:var(--ink-dim); cursor:pointer; transition:all .15s; }
  .mtab:hover { color:var(--ink); }
  .mtab.active { background:var(--accent); border-color:var(--accent); color:var(--bg-bottom); }

  /* hero */
  .hero { display:grid; grid-template-columns:minmax(220px,1fr) 2fr; gap:16px; margin-bottom:16px; }
  .now { padding:24px; display:flex; flex-direction:column; justify-content:center; gap:6px; min-width:0; }
  .now .glyph { font-size:52px; line-height:1; }
  .now .big { font-size:64px; font-weight:700; line-height:1; }
  .now .offset { font-size:11px; font-weight:500; font-style:italic; padding:3px 8px;
    border-radius:10px; opacity:0.8; width:fit-content; }
  .now .offset.warm { background:rgba(217,164,65,0.15); color:var(--accent-2); }
  .now .offset.cool { background:rgba(156,175,136,0.15); color:var(--accent); }
  .now .cond { color:var(--ink-dim); font-size:15px; }
  .now .updated { color:var(--ink-dim); font-size:12px; margin-top:6px; }
  .tiles { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
  .tile { background:var(--card-bg); border:1px solid var(--card-border); border-radius:14px; padding:16px; min-width:0; overflow:hidden; }
  .tile .label { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--ink-dim); }
  .tile .value { font-size:24px; font-weight:700; margin-top:4px; overflow-wrap:anywhere; }
  .tile .sub { font-size:12px; color:var(--ink-dim); margin-top:2px; }

  /* wind compass */
  .wind-row { display:flex; align-items:center; gap:12px; }
  .wind-row > div { min-width:0; }
  .compass-svg { flex:0 0 auto; }
  .compass-svg .card-letter { fill:var(--ink-dim); font-size:13px; text-anchor:middle; dominant-baseline:middle; font-family:'Inter',sans-serif; }
  .compass-needle { transform-box:fill-box; transform-origin:50% 50%; transition:transform .6s ease; }

  /* summary stat row */
  .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:16px; }
  .stat { padding:18px; text-align:center; min-width:0; }
  .stat .value { font-size:28px; font-weight:700; color:var(--accent-2); overflow-wrap:anywhere; }
  .stat .label { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--ink-dim); margin-top:4px; }

  /* forecast strip */
  #forecastStrip { margin-bottom:16px; }
  .fstrip-head { display:flex; align-items:baseline; gap:10px; margin-bottom:10px; }
  .fstrip-head h2 { margin:0; }
  .fstrip-src { font-size:11px; color:var(--ink-dim); }
  .forecast-strip { display:grid; grid-template-columns:repeat(auto-fit,minmax(96px,1fr)); gap:12px; }
  .ftile { padding:14px 8px; text-align:center; min-width:0; display:flex; flex-direction:column; align-items:center; gap:3px; }
  .ftile .ft-when { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--ink-dim); }
  .ftile .ft-ico { font-size:30px; line-height:1.1; }
  .ftile .ft-temp { font-size:15px; font-weight:700; color:var(--accent-2); }
  .ftile .ft-temp .lo { color:var(--ink-dim); font-weight:600; }
  .ftile .ft-cond { font-size:11px; color:var(--ink); overflow-wrap:anywhere; }
  .ftile .ft-sub { font-size:10px; color:var(--accent); }

  /* range chips */
  .chips { display:flex; gap:8px; margin-bottom:14px; }
  .chip { font-size:12px; font-weight:600; padding:6px 14px; border-radius:20px; border:1px solid var(--card-border); background:var(--card-bg); color:var(--ink-dim); cursor:pointer; transition:all .15s; }
  .chip:hover { color:var(--ink); }
  .chip.active { background:var(--accent); border-color:var(--accent); color:var(--bg-bottom); }

  /* chart grid */
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
  .grid .wide { grid-column:1 / -1; }
  .chart-wrap { position:relative; width:100%; height:240px; }

  /* lightning */
  .bolts { display:flex; flex-direction:column; gap:8px; }
  .bolt { display:flex; align-items:center; gap:12px; font-size:14px; padding:8px 10px; border-radius:10px; background:var(--card-bg); }
  .bolt .b-ico { font-size:18px; }
  .bolt .b-dist { font-weight:700; color:var(--accent-2); }
  .bolt .b-time { margin-left:auto; color:var(--ink-dim); font-size:12px; }
  .empty { color:var(--ink-dim); font-size:14px; font-style:italic; padding:6px 2px; }

  footer { text-align:center; color:var(--ink-dim); font-size:12px; padding:20px 0 8px; }

  @media (max-width:820px) {
    body { padding:12px; }
    header { padding:4px 0 16px; }
    .brand h1 { font-size:24px; }
    .hero { grid-template-columns:1fr; }
    .stats { grid-template-columns:1fr 1fr; }
    .stat { padding:14px; }
    .stat .value { font-size:22px; }
    .grid { grid-template-columns:1fr; }
    .now .big { font-size:52px; }
    .tiles { grid-template-columns:repeat(2,1fr); }
    .forecast-strip { grid-template-columns:repeat(3,1fr); }
    .ftile .ft-ico { font-size:26px; }
    .chart-wrap { height:200px; }
  }
  @media (max-width:430px) {
    .brand h1 { font-size:22px; }
    .head-right { gap:10px; }
    .now .big { font-size:46px; }
    .now .glyph { font-size:44px; }
    .stat .value { font-size:20px; }
    .tile .value { font-size:21px; }
    .panel { padding:16px; }
  }
  @media (prefers-reduced-motion: reduce) {
    body { transition:none; }
    .compass-needle, .chip, .toggle button, .iconlink { transition:none; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <h1>wtwlt<span class="dot">.</span></h1>
      <p id="tagline">what's the weather like today?</p>
    </div>
    <div class="head-right">
      <div class="status" id="status"><span class="led" aria-hidden="true"></span><span id="statusText" aria-live="polite">connecting…</span></div>
      <div class="toggle" id="unitToggle" role="group" aria-label="Units">
        <button data-u="metric" aria-label="Celsius">°C</button>
        <button data-u="imperial" aria-label="Fahrenheit">°F</button>
      </div>
      <a class="iconlink" id="sourceLink" href="https://github.com/tlugger/wtwlt" target="_blank" rel="noopener" title="Source on GitHub" aria-label="GitHub">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5a12 12 0 0 0-3.8 23.4c.6.1.8-.3.8-.6v-2c-3.3.7-4-1.6-4-1.6-.6-1.4-1.4-1.8-1.4-1.8-1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.7-1.6-2.7-.3-5.5-1.3-5.5-5.9 0-1.3.5-2.4 1.2-3.2 0-.4-.5-1.6.2-3.2 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0C17 4.7 18 5 18 5c.7 1.6.2 2.8.1 3.2.8.8 1.2 1.9 1.2 3.2 0 4.6-2.8 5.6-5.5 5.9.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6A12 12 0 0 0 12 .5Z"/></svg>
      </a>
    </div>
  </header>

  <!-- Right now -->
  <section class="hero">
    <div class="now card" id="now">
      <div class="glyph" id="nowGlyph">⛅</div>
      <div class="big" id="nowTemp">—</div>
      <div class="offset" id="nowOffset" hidden></div>
      <div class="cond" id="nowCond">awaiting the skies…</div>
      <div class="updated" id="nowUpdated"></div>
      <div class="updated" id="nowLoc"></div>
    </div>
    <div class="tiles" id="tiles"></div>
  </section>

  <!-- Range summary -->
  <div class="chips" id="rangeChips">
    <span class="chip active" data-range="24h">24h</span>
    <span class="chip" data-range="7d">7 days</span>
    <span class="chip" data-range="30d">30 days</span>
  </div>
  <section class="stats" id="stats"></section>

  <!-- Forecast strip (projected conditions; granularity follows the range) -->
  <section id="forecastStrip" hidden>
    <div class="fstrip-head"><h2>Forecast</h2><span class="fstrip-src" id="forecastSrc"></span></div>
    <div class="forecast-strip" id="forecastTiles"></div>
  </section>

  <!-- Charts -->
  <section class="grid">
    <div class="panel wide">
      <div class="panel-head">
        <h2 id="mainTitle">Temperature</h2>
        <div class="metric-tabs" id="metricTabs" role="group" aria-label="Chart metric">
          <span class="mtab active" data-m="temp" role="button" tabindex="0">Temp</span>
          <span class="mtab" data-m="humidity" role="button" tabindex="0">Humidity</span>
          <span class="mtab" data-m="pressure" role="button" tabindex="0">Pressure</span>
          <span class="mtab" data-m="precip" role="button" tabindex="0">Rain %</span>
          <span class="mtab" data-m="cloud" role="button" tabindex="0">Cloud %</span>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="mainChart" role="img" aria-label="Selected weather metric over time"></canvas></div>
    </div>
    <div class="panel"><h2>Wind — avg &amp; gust</h2><div class="chart-wrap"><canvas id="windChart" role="img" aria-label="Wind speed average and gust over time"></canvas></div></div>
    <div class="panel"><h2>Rain</h2><div class="chart-wrap"><canvas id="rainChart" role="img" aria-label="Rainfall over time"></canvas></div></div>
    <div class="panel wide"><h2>Humidity &amp; Pressure</h2><div class="chart-wrap"><canvas id="hpChart" role="img" aria-label="Humidity and pressure over time"></canvas></div></div>
  </section>

  <!-- Lightning -->
  <section class="panel">
    <h2>Lightning</h2>
    <div class="bolts" id="bolts"><div class="empty">no strikes — calm skies ⛅</div></div>
  </section>

  <footer>wtwlt · a home weather station · readings every minute</footer>
</div>

<script>
"use strict";
const $ = (id) => document.getElementById(id);
const STATION = "wtwlt-01";
const LOC = { lat: 39.74, lon: -104.99 }; // default Denver; ?lat=&lon= overrides

const state = {
  units: localStorage.getItem("wtwlt-units") || "imperial",
  range: "24h",
  recentLightning: false,
  rainingNow: false,
  theme: null,
  themeOverride: null,   // ?theme=clear-day|dusk|night|rain|storm pins the look
  mainMetric: "temp",    // which metric the lead chart shows
  current: null,         // latest reading (for re-rendering tiles)
  history: null,         // cached {pts, units} so metric switches don't refetch
  forecast: null,        // cached {pts, units} forecast overlay (now..now+48h)
};

// the toggle-able lead chart: each metric maps to history fields + colours
const MAIN_METRICS = {
  temp:     { label:"Temperature", unit:"temp",     fill:true,  series:[{key:"temp",          label:"Temp",        color:"#C97B5A"}] },
  humidity: { label:"Humidity",    unit:"humidity", fill:true,  series:[{key:"humidity",      label:"Humidity",    color:"#6B8E9E"}] },
  pressure: { label:"Pressure",    unit:"pressure", fill:false, series:[{key:"pressure",      label:"Pressure",    color:"#9C8AA8"}] },
  precip:   { label:"Rain chance", unitText:"%",    fill:false, series:[{key:"precip_chance", label:"Rain chance", color:"#7FA6A6"}] },
  cloud:    { label:"Cloud cover", unitText:"%",    fill:true,  forecastOnly:true, series:[{key:"cloud_pct", label:"Cloud cover", color:"#9AA7B0"}] },
};

// which forecast field backs each lead metric (precip/cloud are forward-looking).
const FORECAST_KEYS = { temp:"temp", humidity:"humidity", pressure:"pressure", precip:"precip_prob", cloud:"cloud_pct" };

// normalized condition -> icon (day/night variants) + label. Order of
// COND_SEVERITY is least→most significant, used to pick a tile's headline.
const COND = {
  clear:   { day:"☀️", night:"🌙", label:"Clear" },
  partly:  { day:"⛅", night:"☁️", label:"Partly cloudy" },
  cloudy:  { day:"☁️", night:"☁️", label:"Cloudy" },
  fog:     { day:"🌫️", night:"🌫️", label:"Fog" },
  drizzle: { day:"🌦️", night:"🌧️", label:"Drizzle" },
  rain:    { day:"🌧️", night:"🌧️", label:"Rain" },
  snow:    { day:"🌨️", night:"🌨️", label:"Snow" },
  thunder: { day:"⛈️", night:"⛈️", label:"Thunder" },
};
const COND_SEVERITY = ["clear","partly","cloudy","fog","drizzle","rain","snow","thunder"];

const RANGES = {
  "24h": { ms: 24*3600e3,  bucket: "raw",  fcCap: 12*3600e3 },
  "7d":  { ms: 7*864e5,    bucket: "hour", fcCap: 48*3600e3 },
  "30d": { ms: 30*864e5,   bucket: "day",  fcCap: 72*3600e3 },
};

// fixed earthy chart series colours (legible on both light & dark themes)
const SERIES = { temp:"#C97B5A", gust:"#B5654A", wind:"#7A8B5A", rain:"#7FA6A6", humidity:"#6B8E9E", pressure:"#D9A441" };

const fmtNum = (v, dp=1) => (v === null || v === undefined) ? "—" : Number(v).toFixed(dp);
const cssVar = (n) => getComputedStyle(document.documentElement).getPropertyValue(n).trim();

async function getJSON(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(path + " → " + r.status);
  return r.json();
}

function rangeParams() {
  const r = RANGES[state.range];
  const to = new Date();
  const from = new Date(to.getTime() - r.ms);
  return { from: from.toISOString(), to: to.toISOString(), bucket: r.bucket };
}

/* ── theming ─────────────────────────────────────────────────────── */
// sunrise/sunset (trimmed SunCalc, MIT) so day/dusk/night tracks real golden hour
const sunTimes = (() => {
  const rad=Math.PI/180, dayMs=864e5, J1970=2440588, J2000=2451545, e=rad*23.4397, J0=0.0009;
  const toDays = d => d.valueOf()/dayMs - 0.5 + J1970 - J2000;
  const fromJ = j => new Date((j + 0.5 - J1970)*dayMs);
  const sma = d => rad*(357.5291 + 0.98560028*d);
  const ecl = M => M + rad*(1.9148*Math.sin(M)+0.02*Math.sin(2*M)+0.0003*Math.sin(3*M)) + rad*102.9372 + Math.PI;
  const dec = L => Math.asin(Math.sin(e)*Math.sin(L));
  const transit = (Ht,lw,n) => J0 + (Ht+lw)/(2*Math.PI) + n;
  const stJ = (ds,M,L) => J2000 + ds + 0.0053*Math.sin(M) - 0.0069*Math.sin(2*L);
  const ha = (h,phi,d) => Math.acos((Math.sin(h)-Math.sin(phi)*Math.sin(d))/(Math.cos(phi)*Math.cos(d)));
  return (date, lat, lng) => {
    const lw=rad*-lng, phi=rad*lat, d=toDays(date);
    const n=Math.round(d - J0 - lw/(2*Math.PI));
    const ds=transit(0,lw,n), M=sma(ds), L=ecl(M), de=dec(L);
    const Jset=stJ(transit(ha(-0.833*rad,phi,de),lw,n),M,L), Jnoon=stJ(ds,M,L);
    return { sunrise: fromJ(Jnoon-(Jset-Jnoon)), sunset: fromJ(Jset) };
  };
})();
function timeOfDay(now = new Date()) {
  let t; try { t = sunTimes(now, LOC.lat, LOC.lon); } catch (e) {}
  if (!t || isNaN(t.sunrise) || isNaN(t.sunset)) {  // polar day/night or bad input
    const h = now.getHours();
    return h>=7&&h<18 ? "day" : ((h>=18&&h<20)||(h>=5&&h<7)) ? "dusk" : "night";
  }
  const m=6e4, sr=t.sunrise.getTime(), ss=t.sunset.getTime(), x=now.getTime();
  if (x < sr-45*m || x > ss+45*m) return "night";
  if (x < sr+15*m || x > ss-15*m) return "dusk";
  return "day";
}
function pickTheme() {
  if (state.themeOverride) return state.themeOverride;
  if (state.recentLightning) return "storm";
  if (state.rainingNow) return "rain";
  const tod = timeOfDay();
  return tod === "day" ? "clear-day" : tod === "dusk" ? "dusk" : "night";
}
const GLYPH = { "clear-day":"☀️", dusk:"🌆", night:"🌙", rain:"🌧️", storm:"⛈️" };
const WORD  = { "clear-day":"clear skies", dusk:"golden hour", night:"quiet night", rain:"rain falling", storm:"storms overhead" };
function applyTheme() {
  const t = pickTheme();
  document.documentElement.setAttribute("data-theme", t);
  $("nowGlyph").textContent = GLYPH[t] || "⛅";
  $("nowCond").textContent = WORD[t] || "";
  if (state.theme !== t) { state.theme = t; applyChartTheme(); }
}

/* ── current conditions ──────────────────────────────────────────── */
async function loadCurrent() {
  let c;
  try { c = await getJSON(`/api/current?station=${STATION}&units=${state.units}`); }
  catch { setStatus(false, "no readings yet"); return; }

  state.current = c;
  state.rainingNow = (c.rain || 0) > 0;
  const u = c.units;
  $("nowTemp").textContent = c.temp == null ? "—" : `${fmtNum(c.temp)}°`;

  const age = Date.now() - new Date(c.ts).getTime();
  const online = age < 5*60e3; // stale after 5 min
  setStatus(online, online ? `updated ${relTime(c.ts)}` : `last seen ${relTime(c.ts)}`);
  $("nowUpdated").textContent = `${u.temp} · ${state.units}`;

  renderTiles();
  renderOffset();
  applyTheme();
}
// Tiles use the latest reading + the current cloud cover from the forecast,
// so they re-render both when a reading arrives and when the forecast loads.
function renderTiles() {
  const c = state.current; if (!c) return;
  const u = c.units;
  $("tiles").innerHTML = [
    windTile(c, u),
    tile("Humidity", `${fmtNum(c.humidity)}${u.humidity}`, ""),
    tile("Pressure", `${fmtNum(c.pressure)}`, u.pressure),
    tile("Rain (1m)", `${fmtNum(c.rain,2)}`, u.rain),
    cloudTile(),
    tile("Soil", `${fmtNum(c.soil)}${u.soil}`, "moisture"),
  ].join("");
}
// Current cloud cover comes from the forecast (no sensor); use the hour nearest now.
function currentCloud() {
  const f = state.forecast; if (!f || !f.pts.length) return null;
  const now = Date.now();
  let best = null, bd = Infinity;
  for (const p of f.pts) {
    const d = Math.abs(new Date(p.ts).getTime() - now);
    if (d < bd) { bd = d; best = p; }
  }
  return best ? best.cloud_pct : null;
}
// Forecast temperature nearest to now; used for the offset badge.
function currentForecastTemp() {
  const f = state.forecast; if (!f || !f.pts.length) return null;
  const now = Date.now();
  let best = null, bd = Infinity;
  for (const p of f.pts) {
    const d = Math.abs(new Date(p.ts).getTime() - now);
    if (d < bd) { bd = d; best = p; }
  }
  return best ? best.temp : null;
}
function renderOffset() {
  const c = state.current; if (!c) return;
  const el = $("nowOffset");
  const ft = currentForecastTemp();
  if (c.temp == null || ft == null) { el.hidden = true; return; }
  const diff = c.temp - ft;
  if (Math.abs(diff) < 0.05) { el.hidden = true; return; }
  const sign = diff > 0 ? "+" : "";
  el.textContent = `${sign}${fmtNum(diff)}° vs forecast`;
  el.className = "offset " + (diff > 0 ? "warm" : "cool");
  el.hidden = false;
}
function cloudTile() {
  const v = currentCloud();
  return tile("Cloud cover", v == null ? "—" : `${Math.round(v)}%`, cloudWord(v));
}
function cloudWord(v) {
  if (v == null) return "forecast";
  if (v < 12) return "clear";
  if (v < 38) return "mostly clear";
  if (v < 70) return "partly cloudy";
  if (v < 90) return "mostly cloudy";
  return "overcast";
}
function tile(label, value, sub) {
  return `<div class="tile"><div class="label">${label}</div><div class="value">${value}</div><div class="sub">${sub||"&nbsp;"}</div></div>`;
}
function windTile(c, u) {
  return `<div class="tile"><div class="label">Wind</div><div class="wind-row">${compassSVG(c.wind.dir_deg, c.wind.dir_cardinal)}` +
    `<div><div class="value">${fmtNum(c.wind.avg)} ${u.speed}</div>` +
    `<div class="sub">gust ${fmtNum(c.wind.gust)} · ${c.wind.dir_cardinal}</div></div></div></div>`;
}
// Arrow points to the bearing the wind blows FROM (the vane reading).
function compassSVG(deg, card) {
  return `<svg class="compass-svg" viewBox="0 0 100 100" width="58" height="58" role="img" aria-label="Wind from ${card}, ${Math.round(deg)} degrees">
    <circle cx="50" cy="50" r="45" fill="none" stroke="var(--card-border)" stroke-width="3"/>
    <text class="card-letter" x="50" y="13">N</text><text class="card-letter" x="88" y="51">E</text>
    <text class="card-letter" x="50" y="90">S</text><text class="card-letter" x="12" y="51">W</text>
    <g class="compass-needle" style="transform:rotate(${deg}deg)">
      <polygon points="50,18 43,52 50,45 57,52" fill="var(--accent-2)"/>
      <polygon points="50,82 43,52 50,59 57,52" fill="var(--ink-dim)"/>
    </g>
  </svg>`;
}
function setStatus(online, text) {
  const el = $("status");
  el.className = "status " + (online ? "online" : "offline");
  $("statusText").textContent = text;
}
function relTime(iso) {
  const s = Math.max(0, (Date.now() - new Date(iso).getTime())/1000);
  if (s < 90) return "just now";
  if (s < 3600) return `${Math.round(s/60)}m ago`;
  if (s < 86400) return `${Math.round(s/3600)}h ago`;
  return `${Math.round(s/86400)}d ago`;
}

/* ── range summary cards ─────────────────────────────────────────── */
async function loadSummary() {

  catch { return; }

/* ── lightning feed ──────────────────────────────────────────────── */
async function loadLightning() {
  const { from, to } = rangeParams();
  let data;
  try { data = await getJSON(`/api/lightning?station=${STATION}&units=${state.units}&from=${from}&to=${to}&limit=20`); }
  catch { return; }

  state.recentLightning = events.some(e => (Date.now() - new Date(e.ts).getTime()) < 30*60e3);

  const shown = events.slice(0, 8);

  ).join("") + (events.length > 8 ? `<div class="empty">+${events.length - 8} more</div>` : "");

/* ── charts ──────────────────────────────────────────────────────── */
// The x-axis is a real (linear) time axis in epoch-ms, so points are spaced by
// actual time — a minute of history and an hour of forecast occupy proportional
// width. Each dataset carries its own {x,y} points; the forecast dataset simply
// starts where history ends (seam), no null-padding needed.
let charts = {};
const tms = iso => new Date(iso).getTime();

// Custom hover mode: per dataset, take the point nearest the cursor's x (within
// a band), so both history and the sparser forecast — and every series on a
// multi-series chart — report at the hovered time. Built-in "x"/"index" modes
// don't fit a time axis where actual and forecast points sit at different x.
Chart.Interaction.modes.xband = function(chart, e, options, useFinalPosition) {
  const pos = (Chart.helpers && Chart.helpers.getRelativePosition)
    ? Chart.helpers.getRelativePosition(e, chart) : { x: e.x, y: e.y };
  const area = chart.chartArea;
  const band = (area.right - area.left) * 0.06;
  const items = [];
  for (const meta of chart.getSortedVisibleDatasetMetas()) {
    let best = null, bestIdx = -1, bestDist = Infinity;
    meta.data.forEach((el, i) => {
      const d = Math.abs(el.getProps(["x"], useFinalPosition).x - pos.x);
      if (d < bestDist) { bestDist = d; best = el; bestIdx = i; }
    });
    if (best && bestDist <= band) items.push({ element: best, datasetIndex: meta.index, index: bestIdx });
  }
  return items;
};

function fmtAxis(ms) {
  const d = new Date(ms);
  if (state.range === "24h") return d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
  if (state.range === "7d")  return d.toLocaleString([], {weekday:"short", hour:"2-digit"});
  return d.toLocaleDateString([], {month:"short", day:"numeric"});
}
function tipTitle(items) {
  return new Date(items[0].parsed.x).toLocaleString([], {month:"short", day:"numeric", hour:"2-digit", minute:"2-digit"});
}
function tipLabel(ctx) {
  return `${ctx.dataset.label}: ${ctx.formattedValue}${ctx.dataset.unit ? " " + ctx.dataset.unit : ""}`;
}
function baseOpts() {
  return {
    responsive:true, maintainAspectRatio:false,
    interaction:{ mode:"xband", intersect:false },
    plugins:{
      legend:{ labels:{ color:cssVar("--ink-dim"), font:{size:11}, usePointStyle:true,
               filter:(item) => !/\(forecast\)/.test(item.text) } },
      tooltip:{
        backgroundColor:cssVar("--bg-bottom"), borderColor:cssVar("--accent"), borderWidth:1,
        titleColor:cssVar("--accent"), bodyColor:cssVar("--ink"),
        cornerRadius:8, padding:10, usePointStyle:true,
        callbacks:{ title:tipTitle, label:tipLabel },
      },
    },
    scales:{
      x:{ type:"linear", bounds:"data", offset:false,
          ticks:{ color:cssVar("--ink-dim"), font:{size:10}, maxRotation:0, autoSkip:true, maxTicksLimit:7,
                  callback:(v) => fmtAxis(v) },
          grid:{ color:cssVar("--grid") } },
      y:{ ticks:{ color:cssVar("--ink-dim"), font:{size:10} }, grid:{ color:cssVar("--grid") } },
    },
  };
}
function line(id, datasets, extraY) {
  const o = baseOpts();
  if (extraY) o.scales.y1 = { position:"right", ticks:{ color:cssVar("--ink-dim"), font:{size:10} }, grid:{ drawOnChartArea:false } };
  charts[id] = new Chart($(id), { type:"line", data:{ datasets }, options:o });
}
function bar(id, datasets) {
  charts[id] = new Chart($(id), { type:"bar", data:{ datasets }, options:baseOpts() });
}
function ds(label, color, yAxis) {
  return { label, data:[], borderColor:color, backgroundColor:color+"33", borderWidth:2,
           tension:0.3, pointRadius:0, pointHoverRadius:4, fill:false, yAxisID:yAxis||"y" };
}
// Forecast dataset: same hue, muted + dashed to read as "projected, not measured".
function fds(label, color, yAxis) {
  return { label:label+" (forecast)", data:[], borderColor:color+"aa", backgroundColor:"transparent",
           borderWidth:2, borderDash:[5,4], tension:0.3, pointRadius:0, pointHoverRadius:4,
           fill:false, yAxisID:yAxis||"y", spanGaps:false };
}
function initCharts() {
  line("mainChart", [ds("Temp", MAIN_METRICS.temp.series[0].color)]);
  charts.mainChart.data.datasets[0].fill = true;
  charts.mainChart.options.plugins.legend.display = false;   // single series — no legend
  line("windChart", [ds("Avg", SERIES.wind), ds("Gust", SERIES.gust)]);
  bar("rainChart", [{ label:"Rain", data:[], backgroundColor:SERIES.rain+"cc", borderColor:SERIES.rain, borderWidth:1 }]);
  charts.rainChart.options.plugins.legend.display = false;   // single series — no legend
  line("hpChart", [ds("Humidity", SERIES.humidity, "y"), ds("Pressure", SERIES.pressure, "y1")], true);
}
function applyChartTheme() {
  for (const c of Object.values(charts)) {
    if (!c) continue;
    c.options.plugins.legend.labels.color = cssVar("--ink-dim");
    const tt = c.options.plugins.tooltip;
    if (tt) { tt.backgroundColor = cssVar("--bg-bottom"); tt.borderColor = cssVar("--accent"); tt.titleColor = cssVar("--accent"); tt.bodyColor = cssVar("--ink"); }
    for (const ax of Object.values(c.options.scales)) {
      if (ax.ticks) ax.ticks.color = cssVar("--ink-dim");
      if (ax.grid && ax.grid.color !== undefined) ax.grid.color = cssVar("--grid");
    }
    c.update("none");
  }
}
// Fetch history + forecast in parallel, then render every chart from the cache.
async function loadCharts() {
  await Promise.all([fetchHistory(), fetchForecast()]);
  renderForecastTiles();
  renderLoc();
  renderTiles();   // fill the cloud-cover tile now the forecast is loaded
  renderOffset();  // update the temperature offset badge
  if (state.history) renderCharts();
}
async function fetchHistory() {
  const { from, to, bucket } = rangeParams();
  try {
    const h = await getJSON(`/api/history?station=${STATION}&units=${state.units}&from=${from}&to=${to}&bucket=${bucket}`);
    const pts = h.points || [];
    // derive an actual "rain chance" from logged precip: it either rained or it didn't
    pts.forEach(p => { p.precip_chance = (p.rain > 0) ? 100 : 0; });
    state.history = { pts, units: h.units };
  } catch { /* keep last good history */ }
}
async function fetchForecast() {
  try {
    const f = await getJSON(`/api/forecast?station=${STATION}&units=${state.units}`);
    state.forecast = { pts: f.points || [], units: f.units, source: f.source, location: f.location };
  } catch { state.forecast = { pts: [], units: null, source: "", location: "" }; }
}
function renderLoc() {
  const f = state.forecast;
  $("nowLoc").textContent = (f && f.location) ? `📍 ${f.location}` : "";
}

// Forecast resampled to the active range's bucket (daily on the day ranges).
function forecastResampled() {
  const f = state.forecast; if (!f || !f.pts.length) return [];
  if (RANGES[state.range].bucket !== "day") return f.pts.slice();
  const days = {};
  for (const p of f.pts) (days[p.ts.slice(0,10)] ||= []).push(p);
  const agg = (arr, k, sum) => {
    const v = arr.map(p => p[k]).filter(x => x != null);
    if (!v.length) return null;
    const t = v.reduce((a,b) => a+b, 0);
    return sum ? t : t / v.length;
  };
  const maxOf = (arr, k) => {
    const v = arr.map(p => p[k]).filter(x => x != null);
    return v.length ? Math.max(...v) : null;
  };
  return Object.entries(days).map(([d, arr]) => ({
    ts: d+"T00:00:00Z",
    temp: agg(arr,"temp"), humidity: agg(arr,"humidity"), pressure: agg(arr,"pressure"),
    wind_avg: agg(arr,"wind_avg"), precip: agg(arr,"precip",true),
    precip_prob: maxOf(arr,"precip_prob"), cloud_pct: agg(arr,"cloud_pct"),
  }));
}

// History plus a forecast tail whose length adapts to the data: never longer
// than the history actually shown (so 4h of readings won't sprout a 48h tail),
// capped per range, with a small floor so there's always a little projection.
function chartAxis() {
  const hist = state.history ? state.history.pts : [];
  const cap = RANGES[state.range].fcCap;
  const now = Date.now();
  let from = now, tail = Math.min(cap, 3*3600e3);
  if (hist.length) {
    from = tms(hist[hist.length-1].bucket);
    const span = from - tms(hist[0].bucket);
    tail = Math.min(cap, Math.max(span, 3*3600e3));
  }
  const fc = forecastResampled().filter(p => { const t = tms(p.ts); return t > from && t <= from + tail; });
  return { hist, fc };
}

// {x,y} points for a metric; the forecast series is seeded with the last actual
// point so its dashed line continues the solid one without a gap.
function actualXY(hist, key) { return hist.map(p => ({ x: tms(p.bucket), y: p[key] })); }
function forecastXY(hist, fc, hk, fk) {
  const out = [];
  if (hist.length && fc.length) { const lp = hist[hist.length-1]; out.push({ x: tms(lp.bucket), y: lp[hk] }); }
  for (const p of fc) out.push({ x: tms(p.ts), y: p[fk] });
  return out;
}
function setChart(id, datasets) {
  const c = charts[id]; if (!c) return;
  c.data.datasets = datasets; c.update("none");
}

// Rebuild the lower grid (wind / rain / humidity+pressure) with forecast overlays.
function renderCharts() {
  const u = state.history.units;
  const { hist, fc } = chartAxis();

  // wind: avg has a forecast, gust does not
  {
    const a = ds("Avg", SERIES.wind);  a.data = actualXY(hist, "wind_avg");  a.unit = u.speed;
    const g = ds("Gust", SERIES.gust); g.data = actualXY(hist, "wind_gust"); g.unit = u.speed;
    const sets = [a, g];
    if (fc.length) { const fa = fds("Avg", SERIES.wind); fa.data = forecastXY(hist, fc, "wind_avg", "wind_avg"); fa.unit = u.speed; sets.push(fa); }
    setChart("windChart", sets);
  }
  // rain: actual + (if available) forecast precip as a muted bar series
  {
    const a = { label:"Rain", data: actualXY(hist, "rain"), backgroundColor:SERIES.rain+"cc", borderColor:SERIES.rain, borderWidth:1, maxBarThickness:14, unit:u.rain };
    const sets = [a];
    if (fc.length && fc.some(p => p.precip != null)) {
      sets.push({ label:"Rain (forecast)", data: fc.map(p => ({ x: tms(p.ts), y: p.precip })),
                  backgroundColor:SERIES.rain+"44", borderColor:SERIES.rain+"99", borderWidth:1, maxBarThickness:14, unit:u.rain });
    }
    setChart("rainChart", sets);   // single measured series — legend stays off
  }
  // humidity (left axis) + pressure (right axis), each with a forecast overlay
  {
    const dh = ds("Humidity", SERIES.humidity, "y");  dh.data = actualXY(hist, "humidity"); dh.unit = u.humidity;
    const dp = ds("Pressure", SERIES.pressure, "y1"); dp.data = actualXY(hist, "pressure"); dp.unit = u.pressure;
    const sets = [dh, dp];
    if (fc.length) {
      const fh = fds("Humidity", SERIES.humidity, "y");  fh.data = forecastXY(hist, fc, "humidity", "humidity"); fh.unit = u.humidity;
      const fp = fds("Pressure", SERIES.pressure, "y1"); fp.data = forecastXY(hist, fc, "pressure", "pressure"); fp.unit = u.pressure;
      sets.push(fh, fp);
    }
    setChart("hpChart", sets);
  }
  renderMain();
}

// Render the toggle-able lead chart from cached history + forecast.
function renderMain() {
  const h = state.history; if (!h) return;
  const cfg = MAIN_METRICS[state.mainMetric] || MAIN_METRICS.temp;
  const unit = cfg.unitText || h.units[cfg.unit];
  const c = charts.mainChart;
  const { hist, fc } = chartAxis();
  const s = cfg.series[0];
  const fk = FORECAST_KEYS[state.mainMetric];

  let sets;
  if (cfg.forecastOnly) {
    // No sensor equivalent — render only the forecast so it spans the full axis
    // (an empty actual series would stretch the axis across the history range).
    const fd = fds(s.label, s.color); fd.unit = unit;
    fd.data = fc.map(p => ({ x: tms(p.ts), y: p[fk] }));
    sets = [fd];
  } else {
    const d = ds(s.label, s.color);
    d.fill = cfg.fill; d.unit = unit;
    d.data = actualXY(hist, s.key);
    sets = [d];
    if (fk && fc.length) {
      const fd = fds(s.label, s.color); fd.unit = unit; fd.data = forecastXY(hist, fc, s.key, fk);
      sets.push(fd);
    }
  }
  c.options.plugins.legend.display = false;   // the title names the metric
  c.data.datasets = sets;
  $("mainTitle").textContent = `${cfg.label} (${unit})`;
  c.update("none");
}

/* ── forecast tiles ──────────────────────────────────────────────── */
// Headline condition for a group of hours: most frequent, ties broken toward
// the more significant condition (so a rainy spell isn't hidden by clear hours).
function dominantCond(conds) {
  const n = {};
  for (const c of conds) if (c) n[c] = (n[c]||0) + 1;
  let best = "", bn = 0, bsev = -1;
  for (const [c, cnt] of Object.entries(n)) {
    const sev = COND_SEVERITY.indexOf(c);
    if (cnt > bn || (cnt === bn && sev > bsev)) { best = c; bn = cnt; bsev = sev; }
  }
  return best;
}
function isNight(date) { try { return timeOfDay(date) === "night"; } catch (e) { return false; } }

// Summarize a set of hourly points into one tile (hi/lo, headline condition,
// precip total, day/night icon choice from the segment midpoint).
function buildTile(seg, idx, mode) {
  const temps = seg.map(p => p.temp).filter(v => v != null);
  const precip = seg.map(p => p.precip).filter(v => v != null).reduce((a,b) => a+b, 0);
  const mid = new Date((new Date(seg[0].ts).getTime() + new Date(seg[seg.length-1].ts).getTime())/2);
  return {
    idx, mode, when: new Date(seg[0].ts),
    hi: temps.length ? Math.max(...temps) : null,
    lo: temps.length ? Math.min(...temps) : null,
    cond: dominantCond(seg.map(p => p.condition)),
    precip, night: isNight(mid),
  };
}
// 24h view: the next 24h as six 4-hour segments.
function hourlySegments(pts) {
  const now = Date.now(), out = [];
  for (let i = 0; i < 6; i++) {
    const a = now + i*4*3600e3, b = a + 4*3600e3;
    const seg = pts.filter(p => { const t = new Date(p.ts).getTime(); return t >= a && t < b; });
    if (seg.length) out.push(buildTile(seg, i, "hour"));
  }
  return out;
}
// 7d / 30d view: up to six daily tiles (keeps a clean 6-up row on mobile).
function dailySegments(pts) {
  const days = {};
  for (const p of pts) (days[p.ts.slice(0,10)] ||= []).push(p);
  return Object.values(days).slice(0, 6).map((seg, i) => buildTile(seg, i, "day"));
}
function tileWhen(t) {
  if (t.mode === "hour") return t.idx === 0 ? "Now" : t.when.toLocaleTimeString([], {hour:"numeric"});
  return t.idx === 0 ? "Today" : t.when.toLocaleDateString([], {weekday:"short"});
}
function forecastTile(t, u) {
  const c = COND[t.cond] || { day:"⛅", night:"⛅", label:"—" };
  const ico = t.night ? c.night : c.day;
  const hi = t.hi == null ? "—" : `${Math.round(t.hi)}°`;
  const lo = t.lo == null ? "" : `<span class="lo">${Math.round(t.lo)}°</span>`;
  const sub = t.precip > 0 ? `<div class="ft-sub">💧 ${fmtNum(t.precip, state.units==="imperial"?2:1)} ${u.rain}</div>` : "";
  return `<div class="ftile card">
    <div class="ft-when">${tileWhen(t)}</div>
    <div class="ft-ico" role="img" aria-label="${c.label}">${ico}</div>
    <div class="ft-temp">${hi} ${lo}</div>
    <div class="ft-cond">${c.label}</div>${sub}
  </div>`;
}
function renderForecastTiles() {
  const f = state.forecast, wrap = $("forecastStrip");
  if (!f || !f.pts.length) { wrap.hidden = true; return; }
  const tiles = state.range === "24h" ? hourlySegments(f.pts) : dailySegments(f.pts);
  if (!tiles.length) { wrap.hidden = true; return; }
  $("forecastTiles").innerHTML = tiles.map(t => forecastTile(t, f.units)).join("");
  $("forecastSrc").textContent = f.source ? `via ${f.source}` : "";
  wrap.hidden = false;
}

/* ── wiring ──────────────────────────────────────────────────────── */
function setUnits(u) {
  state.units = u;
  localStorage.setItem("wtwlt-units", u);
  document.querySelectorAll("#unitToggle button").forEach(b => {
    const on = b.dataset.u === u;
    b.classList.toggle("active", on);
    b.setAttribute("aria-pressed", on ? "true" : "false");
  });
  refreshAll();
}
function refreshLive() { loadCurrent(); loadSummary(); loadLightning(); if (state.range === "24h") loadCharts(); }
function refreshAll()  { loadCurrent(); loadSummary(); loadLightning(); loadCharts(); }

function init() {
  const params = new URLSearchParams(location.search);
  if (params.get("theme")) state.themeOverride = params.get("theme");
  if (params.get("metric") && MAIN_METRICS[params.get("metric")]) state.mainMetric = params.get("metric");
  if (params.get("range") && RANGES[params.get("range")]) state.range = params.get("range");
  if (params.get("lat")) LOC.lat = parseFloat(params.get("lat"));
  if (params.get("lon")) LOC.lon = parseFloat(params.get("lon"));
  initCharts();
  document.querySelectorAll("#unitToggle button").forEach(b => b.onclick = () => setUnits(b.dataset.u));
  document.querySelectorAll("#rangeChips .chip").forEach(chip => chip.onclick = () => {
    state.range = chip.dataset.range;
    document.querySelectorAll("#rangeChips .chip").forEach(c => c.classList.toggle("active", c === chip));
    loadSummary(); loadLightning(); loadCharts();
  });
  document.querySelectorAll("#metricTabs .mtab").forEach(t => {
    const pick = () => {
      state.mainMetric = t.dataset.m;
      document.querySelectorAll("#metricTabs .mtab").forEach(x => x.classList.toggle("active", x === t));
      renderMain();
    };
    t.onclick = pick;
    t.onkeydown = (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); pick(); } };
  });
  document.querySelectorAll("#metricTabs .mtab").forEach(x => x.classList.toggle("active", x.dataset.m === state.mainMetric));
  document.querySelectorAll("#rangeChips .chip").forEach(c => c.classList.toggle("active", c.dataset.range === state.range));
  setUnits(state.units);             // sets toggle + triggers first full load
  applyTheme();
  setInterval(refreshLive, 60e3);    // live tiles refresh each minute
  setInterval(applyTheme, 5*60e3);   // re-evaluate time-of-day theme
}
init();
</script>
</body>
