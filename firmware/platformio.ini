; wtwlt weather station firmware — ESP32 on a SparkFun MicroMod Weather Carrier
; See README.md for build/flash instructions.

[env:esp32_micromod]
platform = espressif32
; Generic ESP32 target (works for the SparkFun ESP32 MicroMod Processor).
; If you have the MicroMod board package installed you may switch this to
; `sparkfun_esp32micromod`. `esp32dev` is the safe, always-available default.
board = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DCORE_DEBUG_LEVEL=2
    -I src              ; allow cross-subdir includes like "sensors/sensors.h"

; Library names resolve from the PlatformIO registry. If a name fails to
; resolve, search `pio pkg search "<name>"` and pin the exact id/version.
lib_deps =
    sparkfun/SparkFun Weather Meter Kit Arduino Library
    sparkfun/SparkFun BME280
    sparkfun/SparkFun VEML6075 Arduino Library
    sparkfun/SparkFun AS3935 Lightning Detector Arduino Library
    knolleary/PubSubClient
    bblanchon/ArduinoJson @ ^7

; Host-based unit tests (no board required):  pio test -e native
; Compiles only the hardware-independent logic (aggregator) + the test suite.
[env:native]
platform = native
test_framework = unity
test_build_src = yes        ; compile project src (filtered below) into the test
build_flags =
    -std=c++17
    -I src
build_src_filter =
    -<*>
    +<aggregator.cpp>
